name: "Secret Scanning" 

 

on: 

  push: 

    branches: [ "main", "master" ] 

  pull_request: 

    branches: [ "main", "master" ] 

  schedule: 

    - cron: '0 10 * * 1' 

 

jobs: 

  gitleaks: 

    name: Gitleaks Scan 

    runs-on: ubuntu-latest 

    steps: 

      - name: Checkout code 

        uses: actions/checkout@v3 

        with: 

          fetch-depth: 0 # Nodig om de volledige geschiedenis te scannen 

 

      - name: Run Gitleaks 

        uses: gitleaks/gitleaks-action@v2 

        env: 

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 

        with: 

          # De pipeline blokkeert (fail) automatisch als er iets gevonden wordt 

          fail: true

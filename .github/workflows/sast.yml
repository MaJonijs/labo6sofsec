name: "SAST Scan"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
      checks: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@v2

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:${{ matrix.language }}"

    - name: Block pipeline on SAST vulnerabilities
      env:
        GH_TOKEN: ${{ github.token }}
      run:
        repo="${{ github.repository }}"

        echo "Checking Code Scanning alerts..."

        alerts=$(gh api repos/$repo/code-scanning/alerts --jq 'length')

        echo "Total alerts: $alerts"

        if [ "$alerts" -gt 0 ]; then
          echo "SAST vulnerabilities found. Blocking pipeline."
          exit 1
        else
          echo "No SAST vulnerabilities found."
        fi
